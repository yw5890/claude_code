<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 2rem; color: #333; margin-bottom: 8px; }
    .subtitle { color: #764ba2; font-weight: 600; margin-bottom: 20px; }
    p { color: #666; line-height: 1.7; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #f0ebff;
      color: #764ba2;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 4px;
    }
    .footer { margin-top: 28px; color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">Claude Code로 만든 첫 번째 페이지</p>
    <p>이 페이지는 Claude Code와 GitHub Actions를 활용하여<br>자동으로 배포된 랜딩 페이지입니다.</p>
    <div>
      <span class="badge">🤖 Claude Code</span>
      <span class="badge">⚡ GitHub Actions</span>
      <span class="badge">🚀 GitHub Pages</span>
    </div>
    <div class="footer">yw5890 · 2026</div>
  </div>
</body>
</html>
